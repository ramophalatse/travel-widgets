name: Auto-update itinerary thumbnails

on:
  push:
    paths:
      - 'assets/nyc-miami-2026/**'

jobs:
  update-thumbs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new images
        id: detect
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD)"
          fi
          FILES=$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" \
            -- 'assets/nyc-miami-2026/' \
            | grep -Ei '\.(jpg|jpeg|png|webp)$' \
            | xargs -I{} basename {} \
            | paste -sd ',' -)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.detect.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.detect.outputs.files != ''
        run: pip install anthropic

      - name: Update itinerary HTML
        if: steps.detect.outputs.files != ''
        id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_IMAGES: ${{ steps.detect.outputs.files }}
        run: python .github/scripts/update_itinerary.py

      - name: Commit directly (confident)
        if: steps.update.outputs.changed == 'true' && steps.update.outputs.confident == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trip-itinerary.html
          git commit -m "auto: add thumbnails — ${{ steps.detect.outputs.files }}"
          git push

      - name: Open PR for review (uncertain match)
        if: steps.update.outputs.changed == 'true' && steps.update.outputs.confident == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-thumbs-$(date +%s)"
          git checkout -b "$BRANCH"
          git add trip-itinerary.html
          git commit -m "auto: thumbnail update — needs review"
          git push origin "$BRANCH"
          gh pr create \
            --title "Thumbnail update · needs your review" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"
